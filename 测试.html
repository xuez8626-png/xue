<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>麻将测试数据编辑器 - 冻结前七列版</title>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; padding: 15px; background-color: #f0f2f5; color: #333; margin: 0; }
        .controls { margin-bottom: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
        
        .table-container { 
            width: 100%; 
            height: calc(100vh - 100px); 
            overflow: auto; 
            background: white; 
            border-radius: 4px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
        }

        table { border-collapse: separate; border-spacing: 0; width: 100%; table-layout: fixed; }

        th, td { 
            border-bottom: 1px solid #e8e8e8; 
            border-right: 1px solid #e8e8e8; 
            padding: 6px; 
            background: white;
            font-size: 13px;
        }

        /* --- 核心：冻结前七列的精确宽度与位置计算 --- */
        /* 累计宽度计算：50 + 100 + 100 + 100 + 100 + 100 + 420 */
        
        .col-1 { width: 50px;  position: sticky; left: 0; z-index: 20; }
        .col-2 { width: 100px; position: sticky; left: 50px; z-index: 20; }
        .col-3 { width: 100px; position: sticky; left: 150px; z-index: 20; }
        .col-4 { width: 100px; position: sticky; left: 250px; z-index: 20; }
        .col-5 { width: 100px; position: sticky; left: 350px; z-index: 20; }
        .col-6 { width: 100px; position: sticky; left: 450px; z-index: 20; }
        .col-7 { 
            width: 420px; 
            position: sticky; 
            left: 550px; 
            z-index: 20; 
            border-right: 3px solid #1890ff !important; /* 蓝线边界 */
        }
        
        /* 普通列宽 */
        .col-attr { width: 90px; }

        /* 第十四列：显示全部内容 (索引从1开始算起是第14列) */
        td:nth-child(14), th:nth-child(14) { 
            width: 300px; 
            white-space: normal; /* 允许换行 */
            word-break: break-all;
            min-width: 200px;
        }

        th { background-color: #fafafa !important; font-weight: bold; border-top: 1px solid #e8e8e8; z-index: 21 !important; }
        tr:hover td { background-color: #f5f7fa !important; }
        
        .mj-view { 
            display: flex; flex-wrap: wrap; gap: 2px; margin-top: 5px; 
            min-height: 40px; background: #f9f9f9; padding: 4px; border-radius: 4px;
        }
        .mj-img { height: 35px; border: 1px solid #ddd; }

        input[type="text"] { 
            width: 100%; padding: 5px; border: 1px solid #d9d9d9; border-radius: 3px; box-sizing: border-box; font-size: 12px;
        }
        .hand-code-input { font-family: monospace; color: #1890ff; }

        button { cursor: pointer; padding: 5px 10px; border: none; border-radius: 4px; background: #1890ff; color: white; }
        .btn-danger { background: #ff4d4f; }
        .btn-add { background: #52c41a; }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn-add" onclick="addRow()">+ 新增行</button>
        <button class="btn-add" onclick="addColumn()">+ 新增属性列</button>
        <button onclick="exportCSV()">导出 CSV</button>
        <button onclick="document.getElementById('fileInput').click()">导入 CSV</button>
        <input type="file" id="fileInput" style="display:none" accept=".csv" onchange="importCSV(this)">
    </div>

    <div class="table-container">
        <table id="testTable">
            <thead>
                <tr id="headerRow">
                    <th class="col-1">操作</th>
                    <th class="col-2" contenteditable="true">用例ID</th>
                    <th class="col-3" contenteditable="true">属性2</th>
                    <th class="col-4" contenteditable="true">属性3</th>
                    <th class="col-5" contenteditable="true">属性4</th>
                    <th class="col-6" contenteditable="true">属性5</th>
                    <th class="col-7" contenteditable="true">手牌编码 (图片)</th>
                    <th class="col-attr" contenteditable="true">人数</th>
                    <th class="col-attr" contenteditable="true">玩法</th>
                    <th class="col-attr" contenteditable="true">属性10</th>
                    <th class="col-attr" contenteditable="true">属性11</th>
                    <th class="col-attr" contenteditable="true">属性12</th>
                    <th class="col-attr" contenteditable="true">属性13</th>
                    <th class="col-attr" contenteditable="true">第14列(全内容)</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

<script>
    const MJ_MAP = {
        "0x01":"1w","0x02":"2w","0x03":"3w","0x04":"4w","0x05":"5w","0x06":"6w","0x07":"7w","0x08":"8w","0x09":"9w",
        "0x11":"1t","0x12":"2t","0x13":"3t","0x14":"4t","0x15":"5t","0x16":"6t","0x17":"7t","0x18":"8t","0x19":"9t",
        "0x21":"1s","0x22":"2s","0x23":"3s","0x24":"4s","0x25":"5s","0x26":"6s","0x27":"7s","0x28":"8s","0x29":"9s",
        "0x31":"east","0x32":"south","0x33":"west","0x34":"north","0x35":"zhong","0x36":"fa","0x37":"bai",
        "0x41":"spring","0x42":"summer","0x43":"autumn","0x44":"winter","0x45":"mei","0x46":"lan","0x47":"zhu","0x48":"ju"
    };

    function updateVisual(input) {
        const val = input.value.trim();
        const container = input.nextElementSibling;
        if (!container) return;
        container.innerHTML = '';
        val.replace(/，/g, ',').split(',').forEach(code => {
            const hex = code.trim().toLowerCase();
            if(MJ_MAP[hex]) {
                const img = document.createElement('img');
                img.src = `images/${MJ_MAP[hex]}.png`;
                img.className = 'mj-img';
                img.onerror = () => { img.style.display = 'none'; }; 
                container.appendChild(img);
            }
        });
    }

    function addRow() {
        const tbody = document.getElementById('tableBody');
        const headerCells = document.getElementById('headerRow').cells;
        const tr = document.createElement('tr');
        
        for(let i = 0; i < headerCells.length; i++) {
            const cell = tr.insertCell(-1);
            // 应用与表头一致的冻结类名
            if(headerCells[i].className) cell.className = headerCells[i].className;
            
            if (i === 0) {
                cell.innerHTML = `<button class="btn-danger" onclick="removeRow(this)">删</button>`;
            } else if (i === 6) { // 第七列（索引6）为手牌编码
                cell.innerHTML = `<input type="text" class="hand-code-input" oninput="updateVisual(this)"><div class="mj-view"></div>`;
            } else {
                cell.innerHTML = `<input type="text">`;
            }
        }
        tbody.appendChild(tr);
    }

    function removeRow(btn) { btn.closest('tr').remove(); }

    function addColumn() {
        const headerRow = document.getElementById('headerRow');
        const th = document.createElement('th');
        th.className = "col-attr";
        th.contentEditable = "true";
        th.innerText = "新属性";
        headerRow.appendChild(th);
        const rows = document.getElementById('tableBody').rows;
        for(let i = 0; i < rows.length; i++) {
            const cell = rows[i].insertCell(-1);
            cell.className = "col-attr";
            cell.innerHTML = `<input type="text">`;
        }
    }

    function exportCSV() {
        let csv = [];
        const rows = document.querySelectorAll("table tr");
        rows.forEach(r => {
            let row = [], cols = r.querySelectorAll("td, th");
            for (let j = 1; j < cols.length; j++) { 
                const input = cols[j].querySelector('input');
                let text = input ? input.value : cols[j].innerText;
                row.push(`"${text.replace(/"/g, '""')}"`);
            }
            csv.push(row.join(","));
        });
        const blob = new Blob(["\ufeff" + csv.join("\n")], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", "config.csv");
        link.click();
    }

    function importCSV(input) {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.split(/\r?\n/).filter(l => l.trim() !== "");
            document.getElementById('headerRow').innerHTML = '<th class="col-1">操作</th>';
            document.getElementById('tableBody').innerHTML = '';
            
            const headers = parseCSVLine(lines[0]);
            headers.forEach((h, idx) => {
                const th = document.createElement('th');
                // 前六列给固定宽度
                if(idx < 5) th.className = `col-${idx+2}`;
                else if(idx === 5) th.className = "col-7";
                else th.className = "col-attr";
                
                th.contentEditable = "true";
                th.innerText = h;
                document.getElementById('headerRow').appendChild(th);
            });

            for(let i = 1; i < lines.length; i++) {
                addRow();
                const lastRow = document.getElementById('tableBody').lastElementChild;
                parseCSVLine(lines[i]).forEach((data, dIdx) => {
                    const cell = lastRow.cells[dIdx+1];
                    if(cell) {
                        const inputField = cell.querySelector('input');
                        if(inputField) {
                            inputField.value = data;
                            if(dIdx === 5) updateVisual(inputField); // CSV第六个数据对应第七列
                        }
                    }
                });
            }
        };
        reader.readAsText(file);
    }

    function parseCSVLine(line) {
        const result = [];
        let cur = '', inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) { result.push(cur.trim()); cur = ''; }
            else cur += char;
        }
        result.push(cur.trim());
        return result.map(v => v.replace(/^"|"$/g, ''));
    }

    // 初始化一行
    window.onload = () => { addRow(); };
</script>
</body>
</html>
